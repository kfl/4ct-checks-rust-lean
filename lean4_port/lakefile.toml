# Library `NearLinear4ct` + the `main` driver + a `test` executable.
name = "NearLinear4ct"
version = "0.1.0"
defaultTargets = ["NearLinear4ct", "main", "test"]

# Beyond-default linters
moreLeanArgs = [
  "-Dlinter.tacticCheckInstances=true",
  "-Dlinter.extra=true",
  "-Dlinter.extra.unreachableTactic=true",
  "-Dlinter.extra.unnecessarySeqFocus=true",
]
moreServerOptions = [
  { name = "linter.tacticCheckInstances", value = true },
  { name = "linter.extra", value = true },
  { name = "linter.extra.unreachableTactic", value = true },
  { name = "linter.extra.unnecessarySeqFocus", value = true },
]

[[lean_lib]]
name = "NearLinear4ct"

[[lean_exe]]
name = "main"
root = "Main"

[[lean_exe]]
name = "test"
root = "Test"
