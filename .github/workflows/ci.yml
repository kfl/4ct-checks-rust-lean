---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# The workflow only reads the repo; no token write access.
permissions:
  contents: read

# Supersede in-flight runs of the same ref (a burst of pushes needs only the
# latest result).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    # Normal runs take under a minute; don't let a wedged build hold a runner.
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust_port
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          cache-workspaces: rust_port
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  lean:
    name: Lean (build + test)
    runs-on: ubuntu-latest
    # Normal runs take under a minute (warm cache); a hung elaboration (e.g. a
    # looping grind) must not hold a runner for the default six hours.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      # Reads lean4_port/lean-toolchain, installs elan + the pinned Lean,
      # caches ~/.elan and .lake, and runs `lake build`.
      # --wfail promotes lint findings (the beyond-default linters enabled in
      # lakefile.toml) to build failures, mirroring clippy's -D warnings.
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean4_port
          build: true
          build-args: "--wfail"
          test: false
      # The proof-obligation checks are a plain `test` executable (no lake test
      # driver): a non-zero exit means a proof obligation fired.
      - name: Test
        working-directory: lean4_port
        run: lake exe test
